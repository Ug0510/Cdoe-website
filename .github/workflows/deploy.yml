name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Secrets
        run: |
          echo "CPANEL_HOST exists: ${{ secrets.CPANEL_HOST != '' }}"
          echo "CPANEL_USER exists: ${{ secrets.CPANEL_USER != '' }}"
          echo "SSH_KEY exists: ${{ secrets.SSH_KEY != '' }}"

      - name: Deploy to cPanel via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          debug: true
          script: |
            pwd
            whoami
            cd /home/tmuac1/public_html/other_websites/test.cdoe.tmu.ac.in
            git pull origin main
            php artisan optimize:clear